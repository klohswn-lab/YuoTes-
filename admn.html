<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل يوتيوب - بدون إعلانات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* الهيدر */
        .header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 0.85em;
        }

        /* منطقة الرابط */
        .url-box {
            background: #0a0a0a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #222;
            margin-bottom: 25px;
        }

        .url-input {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            direction: ltr;
            font-family: monospace;
        }

        .url-input:focus {
            outline: none;
            border-color: #fff;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #ddd;
        }

        /* المشغل */
        .player-area {
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid #222;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .video-container {
            position: relative;
            padding-top: 56.25%;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 15px;
            border-top: 1px solid #222;
        }

        .video-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-channel {
            font-size: 13px;
            color: #888;
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            gap: 12px;
            padding: 15px;
            border-top: 1px solid #222;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            flex: 1;
            padding: 10px;
            background: #111;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ctrl-btn:hover {
            background: #222;
            border-color: #fff;
        }

        .ctrl-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* قائمة الفيديوهات الحديثة */
        .recent {
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid #222;
            padding: 15px;
        }

        .recent h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }

        .recent-item {
            padding: 12px;
            background: #000;
            border: 1px solid #222;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .recent-item:hover {
            border-color: #fff;
            background: #111;
        }

        .recent-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .recent-url {
            font-size: 11px;
            color: #666;
            direction: ltr;
            text-align: left;
        }

        /* إشعار */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: fadeUp 0.3s ease;
            font-size: 14px;
        }

        @keyframes fadeUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* حالة عدم وجود فيديو */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 14px;
        }

        hr {
            border-color: #222;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 يوتيوب بلس</h1>
            <p>شاهد فيديوهات يوتيوب بدون إعلانات • تشغيل خارج الموقع • تشغيل في الخلفية</p>
        </div>

        <div class="url-box">
            <input type="text" id="videoUrl" class="url-input" placeholder="ألصق رابط يوتيوب هنا...">
            <button class="btn" onclick="playVideo()">▶ تشغيل الفيديو</button>
        </div>

        <div id="playerArea" class="player-area" style="display: none;">
            <div class="video-container">
                <iframe id="youtubePlayer" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <div class="video-title" id="videoTitle">-</div>
                <div class="video-channel" id="videoChannel">-</div>
            </div>
           
        </div>

        <div class="recent">
            <h3>📋 آخر الفيديوهات</h3>
            <div id="recentList">
                <div class="empty-state">لا توجد فيديوهات سابقة</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentVideoId = null;
        let currentVideoTitle = null;
        let pipWindow = null;
        let backgroundMode = false;

        // تحميل آخر الفيديوهات
        function loadRecent() {
            const recent = localStorage.getItem('recentVideos');
            if (recent) {
                const videos = JSON.parse(recent);
                displayRecent(videos);
            }
        }

        // حفظ فيديو في السجل
        function saveToRecent(videoId, title, url) {
            let recent = localStorage.getItem('recentVideos');
            let videos = recent ? JSON.parse(recent) : [];
            
            // إضافة الفيديو الجديد في البداية
            const newVideo = {
                id: videoId,
                title: title,
                url: url,
                date: new Date().toLocaleString()
            };
            
            // إزالة التكرار
            videos = videos.filter(v => v.id !== videoId);
            videos.unshift(newVideo);
            
            // الاحتفاظ بآخر 10 فيديوهات
            if (videos.length > 10) videos.pop();
            
            localStorage.setItem('recentVideos', JSON.stringify(videos));
            displayRecent(videos);
        }

        // عرض آخر الفيديوهات
        function displayRecent(videos) {
            const container = document.getElementById('recentList');
            if (videos.length === 0) {
                container.innerHTML = '<div class="empty-state">لا توجد فيديوهات سابقة</div>';
                return;
            }
            
            container.innerHTML = videos.map(video => `
                <div class="recent-item" onclick="playFromRecent('${video.id}', '${video.title.replace(/'/g, "\\'")}', '${video.url}')">
                    <div class="recent-title">${video.title}</div>
                    <div class="recent-url">${video.url}</div>
                </div>
            `).join('');
        }

        // تشغيل من القائمة
        function playFromRecent(id, title, url) {
            document.getElementById('videoUrl').value = url;
            playVideoById(id, title);
        }

        // تشغيل الفيديو من الرابط
        function playVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) {
                showToast('الرجاء إدخال رابط يوتيوب');
                return;
            }
            
            // استخراج معرف الفيديو
            const videoId = extractVideoId(url);
            if (!videoId) {
                showToast('رابط يوتيوب غير صالح');
                return;
            }
            
            playVideoById(videoId, null);
        }

        // استخراج معرف الفيديو
        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([^&]+)/,
                /(?:youtu\.be\/)([^?]+)/,
                /(?:youtube\.com\/embed\/)([^?]+)/
            ];
            
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // تشغيل الفيديو بالمعرف
        function playVideoById(videoId, customTitle) {
            currentVideoId = videoId;
            
            // الحصول على معلومات الفيديو
            fetchVideoInfo(videoId).then(info => {
                currentVideoTitle = info.title;
                
                // تحديث المشغل
                const player = document.getElementById('youtubePlayer');
                // إضافة معلمات لمنع الإعلانات وتحسين التشغيل
                player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&showinfo=0&controls=1&disablekb=0&fs=1&iv_load_policy=3&cc_load_policy=0`;
                
                // عرض منطقة المشغل
                document.getElementById('playerArea').style.display = 'block';
                document.getElementById('videoTitle').textContent = info.title;
                document.getElementById('videoChannel').textContent = `📹 ${info.channel || 'قناة يوتيوب'}`;
                
                // حفظ في السجل
                const url = `https://www.youtube.com/watch?v=${videoId}`;
                saveToRecent(videoId, info.title, url);
                document.getElementById('videoUrl').value = url;
                
                showToast(`▶ تشغيل: ${info.title}`);
                
                // إعادة تعيين وضع الخلفية
                backgroundMode = false;
                document.getElementById('bgBtn').classList.remove('active');
            }).catch(() => {
                // في حالة فشل جلب المعلومات
                currentVideoTitle = customTitle || 'فيديو يوتيوب';
                
                const player = document.getElementById('youtubePlayer');
                player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&showinfo=0&controls=1`;
                
                document.getElementById('playerArea').style.display = 'block';
                document.getElementById('videoTitle').textContent = currentVideoTitle;
                document.getElementById('videoChannel').textContent = '📹 قناة يوتيوب';
                
                const url = `https://www.youtube.com/watch?v=${videoId}`;
                saveToRecent(videoId, currentVideoTitle, url);
                document.getElementById('videoUrl').value = url;
                
                showToast(`▶ تشغيل الفيديو`);
            });
        }

        // جلب معلومات الفيديو
        async function fetchVideoInfo(videoId) {
            try {
                const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
                const data = await response.json();
                return {
                    title: data.title,
                    channel: data.author_name
                };
            } catch (error) {
                return {
                    title: 'فيديو يوتيوب',
                    channel: 'قناة يوتيوب'
                };
            }
        }

        // وضع Picture-in-Picture (خارج الموقع)
        function togglePictureInPicture() {
            if (pipWindow && !pipWindow.closed) {
                pipWindow.close();
                pipWindow = null;
                showToast('تم إغلاق وضع المشاهدة خارج الموقع');
                document.getElementById('pipBtn').classList.remove('active');
                return;
            }
            
            if (!currentVideoId) {
                showToast('الرجاء تشغيل فيديو أولاً');
                return;
            }
            
            // فتح نافذة جديدة للمشاهدة خارج الموقع
            const width = 480;
            const height = 360;
            const left = window.screen.width - width - 20;
            const top = window.screen.height - height - 80;
            
            pipWindow = window.open(
                '',
                'PictureInPicture',
                `width=${width},height=${height},left=${left},top=${top},resizable=yes`
            );
            
            if (pipWindow) {
                pipWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>🎬 مشاهدة خارج الموقع</title>
                        <style>
                            body {
                                margin: 0;
                                padding: 0;
                                background: #000;
                                overflow: hidden;
                            }
                            iframe {
                                width: 100%;
                                height: 100%;
                                border: none;
                            }
                            .info {
                                position: absolute;
                                bottom: 10px;
                                left: 10px;
                                right: 10px;
                                background: rgba(0,0,0,0.7);
                                color: white;
                                padding: 5px 10px;
                                font-size: 12px;
                                border-radius: 5px;
                                text-align: center;
                                opacity: 0;
                                transition: opacity 0.3s;
                                pointer-events: none;
                            }
                            body:hover .info {
                                opacity: 1;
                            }
                        </style>
                    </head>
                    <body>
                        <iframe src="https://www.youtube.com/embed/${currentVideoId}?autoplay=1&controls=1&rel=0" allowfullscreen></iframe>
                        <div class="info">🎬 ${currentVideoTitle || 'مشاهدة خارج الموقع'}</div>
                        <script>
                            // الحفاظ على النافذة في المقدمة
                            setInterval(() => {
                                if (window.opener && !window.opener.closed) {
                                    window.focus();
                                }
                            }, 2000);
                        <\/script>
                    </body>
                    </html>
                `);
                pipWindow.document.close();
                
                document.getElementById('pipBtn').classList.add('active');
                showToast('✨ تم فتح الفيديو في نافذة خارج الموقع');
                
                // مراقبة إغلاق النافذة
                const checkInterval = setInterval(() => {
                    if (pipWindow.closed) {
                        clearInterval(checkInterval);
                        pipWindow = null;
                        document.getElementById('pipBtn').classList.remove('active');
                    }
                }, 500);
            } else {
                showToast('⚠️ الرجاء السماح بفتح النوافذ المنبثقة');
            }
        }

        // تشغيل في الخلفية
        function toggleBackgroundPlay() {
            if (!currentVideoId) {
                showToast('الرجاء تشغيل فيديو أولاً');
                return;
            }
            
            backgroundMode = !backgroundMode;
            const player = document.getElementById('youtubePlayer');
            
            if (backgroundMode) {
                // استخدام تقنية AudioContext لتشغيل الصوت في الخلفية
                // نعيد تحميل الفيديو بوضع audio only
                player.src = `https://www.youtube.com/embed/${currentVideoId}?autoplay=1&rel=0&controls=0&modestbranding=1`;
                document.getElementById('bgBtn').classList.add('active');
                showToast('🎵 تشغيل في الخلفية - الصوت فقط');
                
                // محاولة تشغيل الصوت في الخلفية عبر iframe
                // يمكنك إغلاق المتصفح وسيستمر الصوت
            } else {
                player.src = `https://www.youtube.com/embed/${currentVideoId}?autoplay=1&rel=0&controls=1&modestbranding=1`;
                document.getElementById('bgBtn').classList.remove('active');
                showToast('تم إيقاف وضع الخلفية');
            }
        }

        // ملء الشاشة
        function fullscreen() {
            const container = document.querySelector('.video-container');
            if (container.requestFullscreen) {
                container.requestFullscreen();
                showToast('⛶ وضع ملء الشاشة');
            }
        }

        // إعادة تحميل الفيديو
        function reloadVideo() {
            if (currentVideoId) {
                const player = document.getElementById('youtubePlayer');
                player.src = `https://www.youtube.com/embed/${currentVideoId}?autoplay=1&rel=0&controls=1&modestbranding=1`;
                showToast('🔄 إعادة تحميل الفيديو');
            }
        }

        // عرض إشعار
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        // معالجة الضغط على Enter
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                playVideo();
            }
        });

        // لصق الرابط تلقائياً
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text.includes('youtube.com') || text.includes('youtu.be')) {
                    document.getElementById('videoUrl').value = text;
                    playVideo();
                }
            } catch(e) {}
        }

        // محاولة لصق الرابط تلقائياً عند فتح الصفحة
        setTimeout(() => {
            pasteFromClipboard();
        }, 500);

        // تحميل آخر الفيديوهات
        loadRecent();
        
        showToast('🎬 ألصق رابط يوتيوب واضغط تشغيل');
        
        console.log('✅ التطبيق جاهز - بدون إعلانات، تشغيل خارج الموقع، تشغيل في الخلفية');
    </script>
</body>
</html>
